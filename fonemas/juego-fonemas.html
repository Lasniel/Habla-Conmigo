<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Juego de Fonemas /s/ y /r/</title>
   <style>
    body {
      font-family: "Comic Sans MS", cursive;
      text-align: center;
      background-color: #f1f8e9;
      padding: 20px;
    }

    h2 { color: #f57c00; margin-bottom: 20px; }

    .contenedor {
      display: flex;
      justify-content: center;
      gap: 60px;
      margin-top: 40px;
    }

    .cofre {
      width: 180px;
      height: 180px;
      border: 4px solid #795548;
      border-radius: 12px;
      background-color: #ffe082;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5em;
      font-weight: bold;
      position: relative;
      overflow: hidden;
    }

    .estrella {
      position: absolute;
      font-size: 3em;
      color: gold;
      display: none;
      animation: brillar 1s ease-in-out infinite;
    }

    @keyframes brillar {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.3); opacity: 0.7; }
      100% { transform: scale(1); opacity: 1; }
    }

    .imagenes {
      margin-top: 40px;
      display: flex;
      justify-content: center;
      gap: 30px;
      flex-wrap: wrap;
    }

    .imagenes img {
      width: 120px;
      cursor: grab;
      border-radius: 10px;
      box-shadow: 2px 2px 6px rgba(0,0,0,0.2);
    }

    .mensaje { margin-top: 30px; font-size: 1.3em; font-weight: bold; }
    .contador { margin-top: 20px; font-size: 1.2em; color: #2e7d32; }
  </style>
</head>
<body>
  <h2>🎮 Arrastra la palabra al cofre correcto</h2>
  <p>Coloca las imágenes según el fonema inicial (/s/ o /r/).</p>

  <div class="contenedor">
    <div id="cofre-s" class="cofre">/s/
      <span class="estrella" id="estrella-s">⭐</span>
    </div>
    <div id="cofre-r" class="cofre">/r/
      <span class="estrella" id="estrella-r">⭐</span>
    </div>
  </div>

  <div class="imagenes">
    <!-- Fonema /s/ -->
    <img src="../img/sol.png" alt="Sol" draggable="true" id="sol" />
    <img src="../img/silla.png" alt="Silla" draggable="true" id="silla" />
    <img src="../img/serpiente.png" alt="Serpiente" draggable="true" id="serpiente" />

    <!-- Fonema /r/ -->
    <img src="../img/raton.png" alt="Ratón" draggable="true" id="raton" />
    <img src="../img/rosa.png" alt="Rosa" draggable="true" id="rosa" />
    <img src="../img/rio.png" alt="Río" draggable="true" id="rio" />
  </div>

  <p id="mensaje" class="mensaje"></p>
  <p id="contador" class="contador">⭐ Estrellas acumuladas: 0</p>

  <!-- Audios -->
  <audio id="aplausos" src="../audio/aplausos.mp3"></audio>
  <audio id="campana" src="../audio/campanita.mp3"></audio>
  <audio id="fanfarria" src="../audio/fanfarria.mp3"></audio>

  <script>
    const mensaje = document.getElementById("mensaje");
    const contador = document.getElementById("contador");
    let estrellas = 0;

    function permitirDrop(ev) { ev.preventDefault(); }
    function arrastrar(ev) { ev.dataTransfer.setData("id", ev.target.id); }

    function soltar(ev, fonema) {
      ev.preventDefault();
      const id = ev.dataTransfer.getData("id");
      const estrella = document.getElementById("estrella-" + fonema);

      // Palabras correctas para cada fonema
      const correctasS = ["sol", "silla", "serpiente"];
      const correctasR = ["raton", "rosa", "rio"];

      if ((fonema === "s" && correctasS.includes(id)) ||
          (fonema === "r" && correctasR.includes(id))) {
        mensaje.textContent = "✅ ¡Muy bien! " + id + " comienza con /" + fonema + "/";
        mensaje.style.color = "#2e7d32";
        estrella.style.display = "block";
        document.getElementById("aplausos").play();
        estrellas++;
        contador.textContent = "⭐ Estrellas acumuladas: " + estrellas;
        if (estrellas === 6) {
          document.getElementById("fanfarria").play();
        }
      } else {
        mensaje.textContent = "❌ Inténtalo otra vez…";
        mensaje.style.color = "#c62828";
        document.getElementById("campana").play();
      }
    }

    // Eventos cofres
    document.getElementById("cofre-s").addEventListener("dragover", permitirDrop);
    document.getElementById("cofre-r").addEventListener("dragover", permitirDrop);
    document.getElementById("cofre-s").addEventListener("drop", ev => soltar(ev, "s"));
    document.getElementById("cofre-r").addEventListener("drop", ev => soltar(ev, "r"));

    // Eventos imágenes
    document.querySelectorAll(".imagenes img").forEach(img => {
      img.addEventListener("dragstart", arrastrar);
    });
  </script>
  </body>
 <!-- Botón redondo de salir con icono y texto -->
<a href="../index.html" class="btn-salir">
    <div class="contenido-salir">
      <img src="../img/puerta.png" alt="Salir" />
      <span>Salir</span>
    </div>
  </a>  
</html>
