<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Fonema /r/ – ¿Cuál comienza con ese sonido?</title>
  <link rel="stylesheet" href="../style.css" />
  <style>
    .actividad {
      text-align: center;
      margin-top: 40px;
    }

    .instruccion {
      font-size: 1.4em;
      margin-bottom: 20px;
    }

    .opciones {
      display: flex;
      justify-content: center;
      gap: 40px;
      flex-wrap: wrap;
    }

    .opcion img {
      width: 150px;
      border-radius: 10px;
      cursor: pointer;
      border: 4px solid transparent;
      transition: transform 0.2s ease;
    }

    .opcion img:hover {
      transform: scale(1.05);
    }

    .feedback {
      font-size: 1.3em;
      font-weight: bold;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="actividad">
    <p class="instruccion">
      🔊 ¿Qué palabra comienza con el sonido <strong>/r/</strong>?
    </p>

    <audio id="audio-consigna" src="../audio/rrr.mp3" autoplay></audio>
    <button class="boton" onclick="document.getElementById('audio-consigna').play()">
      🔁 Repetir
    </button>

    <div class="opciones">
      <div class="opcion" onclick="respuesta(true)">
        <img src="../img/raton.png" alt="Ratón" />
        <p>Ratón</p>
      </div>
      <div class="opcion" onclick="respuesta(false)">
        <img src="../img/gato.png" alt="Gato" />
        <p>Gato</p>
      </div>
    </div>

    <p id="mensaje" class="feedback"></p>

    <script>
      function respuesta(acierto) {
        const mensaje = document.getElementById("mensaje");
        if (acierto) {
          mensaje.textContent = "✅ ¡Muy bien! Ratón comienza con /r/";
          mensaje.style.color = "#2e7d32";
        } else {
          mensaje.textContent = "❌ Inténtalo otra vez… escucha con atención.";
          mensaje.style.color = "#c62828";
        }
      }
    </script>

    <!-- Navegación única al final -->
    <div style="margin-top: 40px; display: flex; justify-content: center; gap: 80px;">
      <a href="fonema-s-actividad.html" class="boton">⬅ Atrás</a>
      <a href="fonema-r-repite.html" class="boton">➡ Siguiente</a>
    </div>
  </div>
</body>
</html>
