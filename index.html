<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Bienvenido a Habla Conmigo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      background-color: #e1f5fe;
      font-family: "Comic Sans MS", cursive;
      text-align: center;
      margin: 0;
      padding: 0;
    }

    .portada {
      padding: 60px;
    }

    .imagen-portada {
      width: 100%;
      max-width: 400px;
      border-radius: 20px;
      margin-bottom: 20px;
      animation: girar 3s ease-in-out infinite;
    }

    h1 {
      font-size: 2.5em;
      color: #f57c00;
      margin-bottom: 30px;
    }

    @keyframes girar {
      0% { transform: rotate(0deg); }
      50% { transform: rotate(10deg); }
      100% { transform: rotate(0deg); }
    }

    .botones {
      display: flex;
      justify-content: center;
      gap: 30px; /* espacio entre botones */
      margin-top: 20px;
    }

    .boton {
      background-color: #4CAF50;
      color: white;
      padding: 15px 30px;
      font-size: 1.2em;
      border: none;
      border-radius: 10px;
      text-decoration: none;
      cursor: pointer;
      transition: background-color 0.3s ease, transform 0.3s ease;
      animation: latido 1.5s infinite;
    }

    .boton:hover {
      background-color: #388e3c;
      transform: scale(1.05);
    }

    @keyframes latido {
      0% { transform: scale(1); }
      50% { transform: scale(1.08); }
      100% { transform: scale(1); }
    }
  </style>
</head>
<body>
  <div class="portada">
    <img src="img/sol.png" alt="Sol sonriente" class="imagen-portada" />
    <h1>¡Bienvenido a Habla Conmigo!</h1>
    
    <!-- Contenedor con los tres botones alineados -->
    <div class="botones">
      <a href="menu.html" class="boton">Comenzar</a>
      <a href="ajustes.html" class="boton">🔧 Ajustes</a>
      <a href="fonemas/juego-fonemas.html" class="boton">🎮 Mini‑juego</a>
    </div>
  </div>
</body>
</html>
