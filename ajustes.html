<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Ajustes – Habla Conmigo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      background-color: #f1f8e9;
      font-family: "Comic Sans MS", cursive;
      margin: 0;
      padding: 40px;
      text-align: center;
    }

    h2 {
      color: #2e7d32;
      margin-bottom: 30px;
    }

    .ajustes {
      display: inline-block;
      text-align: left;
      background: #ffffff;
      padding: 20px 30px;
      border-radius: 12px;
      box-shadow: 2px 2px 8px rgba(0,0,0,0.2);
    }

    .ajustes label {
      display: block;
      margin: 12px 0;
      font-size: 1.2em;
      color: #4e342e;
    }

    select, input[type="range"] {
      margin-top: 6px;
    }

    .boton {
      margin-top: 20px;
      display: inline-block;
    }
  </style>
</head>
<body>
  <h2>⚙️ Ajustes de Habla Conmigo</h2>

  <div class="ajustes">
    <!-- Sonidos -->
    <label>
      <input type="checkbox" id="sonidos" checked />
      Activar sonidos
    </label>

    <!-- Modo oscuro -->
    <label>
      <input type="checkbox" id="oscuro" />
      Activar modo oscuro
    </label>

    <!-- Tamaño de letra -->
    <label>
      Tamaño de letra:
      <select id="tamano-letra">
        <option value="16px">Pequeño</option>
        <option value="20px" selected>Medio</option>
        <option value="24px">Grande</option>
      </select>
    </label>

    <!-- Idioma -->
    <label>
      Idioma:
      <select id="idioma">
        <option value="es" selected>Español</option>
        <option value="en">Inglés</option>
        <option value="fr">Francés</option>
      </select>
    </label>

    <!-- Velocidad de audio -->
    <label>
      Velocidad de audio:
      <input type="range" id="velocidad-audio" min="0.5" max="2" step="0.1" value="1" />
      <span id="valor-velocidad">1x</span>
    </label>
  </div>

  <a href="index.html" class="boton">⬅ Volver al inicio</a>

  </body>
  <script src="ajustes.js"></script>
</html>
